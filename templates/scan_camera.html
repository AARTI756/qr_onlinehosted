{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">

    <h2 class="mb-4">Scan QR Code</h2>
    <p class="text-muted">Align QR within frame</p>

    <!-- 📷 Scanner Wrapper -->
    <div class="scanner-wrapper">
        <div id="reader"></div>

        <!-- 🟩 Corners -->
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
    </div>

    <p id="result" class="mt-3 fw-bold"></p>

</div>

<!-- 🎨 PREMIUM STYLES -->
<style>
.scanner-wrapper {
    position: relative;
    width: 100%;
    max-width: 400px;
    margin: auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* Camera */
#reader {
    width: 100%;
}

/* 🟩 Corner style */
.corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 4px solid #00ff88;
    animation: glow 1.5s infinite alternate;
}

/* Position corners */
.tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
.tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
.bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
.br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

/* ✨ Glow animation */
@keyframes glow {
    from { box-shadow: 0 0 5px #00ff88; }
    to { box-shadow: 0 0 15px #00ff88; }
}
</style>

<!-- 📷 SCRIPT -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let scanningStopped = false;

function onScanSuccess(decodedText) {

    if (scanningStopped) return;
    scanningStopped = true;

    document.getElementById('result').innerHTML =
        "<span style='color:green;'>✅ Scanned:</span> " + decodedText;

    // Stop scanner
    html5QrcodeScanner.clear();

    // 🚀 Auto redirect
    setTimeout(() => {
        if (decodedText.includes("/verify/")) {
            window.location.href = decodedText;
        } else {
            window.location.href = "/scan_result?data=" + encodeURIComponent(decodedText);
        }
    }, 800);
}

let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250
    }
);

html5QrcodeScanner.render(onScanSuccess);
</script>

{% endblock %}
