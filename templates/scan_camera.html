{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <h2 class="mb-4">Scan QR Code</h2>

    <p class="text-muted">
        Real-time QR detection with visual tracking.
    </p>

    <!-- 📷 Scanner Wrapper -->
    <div class="scanner-container">
        <div id="reader"></div>

        <!-- 🟩 Bounding Box -->
        <div id="qr-box">
            <div class="corner tl"></div>
            <div class="corner tr"></div>
            <div class="corner bl"></div>
            <div class="corner br"></div>
        </div>

        <!-- 🔄 Scan Line -->
    </div>

    <p id="result" class="mt-3 fw-bold"></p>
</div>

<!-- 🎨 STYLES -->
<style>
.scanner-container {
    position: relative;
    width: 100%;
    max-width: 400px;
    margin: auto;
    border-radius: 12px;
    overflow: hidden;
}

/* Reader */
#reader {
    width: 100%;
}

/* 📦 Bounding Box */
#qr-box {
    position: absolute;
    width: 250px;
    height: 250px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

/* 🟩 Corners */
.corner {
    position: absolute;
    width: 30px;
    height: 30px;
    border: 4px solid lime;
}

/* Each corner */
.tl { top: 0; left: 0; border-right: none; border-bottom: none; }
.tr { top: 0; right: 0; border-left: none; border-bottom: none; }
.bl { bottom: 0; left: 0; border-right: none; border-top: none; }
.br { bottom: 0; right: 0; border-left: none; border-top: none; }


</style>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let scanningStopped = false;

function onScanSuccess(decodedText) {

    if (scanningStopped) return;
    scanningStopped = true;

    document.getElementById('result').innerHTML =
        "<strong>Scanned:</strong> " + decodedText;

    // 🔥 Stop scanner
    html5QrcodeScanner.clear();

    // 🚀 Redirect
    setTimeout(() => {
        if (decodedText.includes("/verify/")) {
            window.location.href = decodedText;
        } else {
            window.location.href = "/scan_result?data=" + encodeURIComponent(decodedText);
        }
    }, 700);
}

let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250
    }
);

html5QrcodeScanner.render(onScanSuccess);
</script>

{% endblock %}
