{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <h2 class="mb-4">Scan QR Code</h2>

    <p class="text-muted">
        Real-time QR detection.
    </p>

    <!-- 📷 Scanner -->
    <div class="scanner-container">
        <div id="reader"></div>
    </div>

    <p id="result" class="mt-3 fw-bold"></p>
</div>

<!-- 🎨 CLEAN CSS -->
<style>
.scanner-container {
    width: 100%;
    max-width: 400px;
    margin: auto;
    border-radius: 12px;
    overflow: hidden;
}

#reader {
    width: 100%;
}
</style>

<!-- 📷 QR SCRIPT -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let scanningStopped = false;

function onScanSuccess(decodedText) {

    if (scanningStopped) return;
    scanningStopped = true;

    document.getElementById('result').innerHTML =
        "<strong>Scanned:</strong> " + decodedText;

    // Stop scanner
    html5QrcodeScanner.clear();

    // Auto redirect
    setTimeout(() => {
        if (decodedText.includes("/verify/")) {
            window.location.href = decodedText;
        } else {
            window.location.href = "/scan_result?data=" + encodeURIComponent(decodedText);
        }
    }, 700);
}

let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250
    }
);

html5QrcodeScanner.render(onScanSuccess);
</script>

{% endblock %}
