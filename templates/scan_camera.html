{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">
    <h2 class="mb-4">Scan QR Code</h2>

    <p class="text-muted">
        You can scan a QR code using your camera or upload an image below.
    </p>

    <!-- QR scanner -->
    <div id="reader" style="width: 100%; max-width: 400px; margin: auto;"></div>
    <!-- Result -->
    <p id="result" class="mt-3 fw-bold"></p>

    <!-- Proceed Button (used only for upload) -->
    <button id="proceedBtn" class="btn btn-primary mt-3" onclick="processQR()" disabled>
        Proceed
    </button>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let scannedData = null;

// When QR is scanned (camera OR upload)
function onScanSuccess(decodedText, decodedResult) {
    document.getElementById('result').innerHTML =
        "<strong>Scanned:</strong> " + decodedText;

    scannedData = decodedText;

    // 📷 Camera scan → auto proceed
    if (decodedResult && decodedResult.result) {
        setTimeout(() => processQR(), 800); // small delay for UX
    } 
    // 📁 Upload scan → enable button
    else {
        document.getElementById('proceedBtn').disabled = false;
    }
}

// Initialize scanner (camera + built-in upload)
let html5QrcodeScanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);
html5QrcodeScanner.render(onScanSuccess);

// Process QR
function processQR() {
    if (!scannedData) {
        alert("Please scan or upload a QR code first.");
        return;
    }

    if (scannedData.includes("/verify/")) {
        window.location.href = scannedData;
    } else {
        window.location.href = "/scan_result?data=" + encodeURIComponent(scannedData);
    }
}
</script>

{% endblock %}
