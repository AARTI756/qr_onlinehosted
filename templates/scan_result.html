{% extends "base.html" %}

{% block content %}
<div class="container mt-5 text-center">

    <h2>Scan Result</h2>

    <div class="card shadow p-4 mt-3">

        <p><strong>Data:</strong></p>
        <div class="alert alert-info">
            {{ data }}
        </div>

        <p class="mt-3"><strong>Detected Type:</strong></p>

        <!-- ✅ Badge ONLY for type -->
        <span class="badge 
            {% if 'URL' in qr_type %}bg-primary
            {% elif 'Email' in qr_type %}bg-success
            {% else %}bg-secondary
            {% endif %}
            p-2">
            {{ qr_type }}
        </span>

        <!-- ✅ Button SEPARATE (IMPORTANT) -->
        {% if is_url %}
            <div class="mt-3">
                <a href="{{ data }}" target="_blank" class="btn btn-success">
                    Open Link 🌐
                </a>
            </div>
        {% endif %}

    </div>

    <a href="/scan_camera" class="btn btn-primary mt-4">
        Scan Again
    </a>

</div>
{% endblock %}
