{% extends "base.html" %}
{% block title %}QR Generated{% endblock %}
{% block content %}
<div class="card p-4 text-center mx-auto" style="max-width: 500px;">
    <h3 class="mb-3">QR Code Generated</h3>
<img src="/{{ qr_image }}" class="img-fluid mb-3" alt="QR Code">    {% if data %}
    <button onclick="toggleData()">Show Data</button>

    <p id="qrData" style="display: none;">
        Data: {{ data }}
    </p>    {% endif %}
    <a href="/generate" class="btn btn-primary w-100">Generate Another</a>
</div>


<script>
function toggleData() {
    var data = document.getElementById("qrData");

    if (data.style.display === "none") {
        data.style.display = "block";
    } else {
        data.style.display = "none";
    }
}
</script>

{% endblock %}
