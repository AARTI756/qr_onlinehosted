{% extends "base.html" %}
{% block title %}Generate QR{% endblock %}

{% block content %}
<div class="card p-4 mx-auto" style="max-width: 500px;">
    <h3 class="mb-3 text-center">Generate QR</h3>
    
    <p class="text-muted text-center">
        Enter any text or URL below to generate a QR code. You can also set expiry, password protection, or one-time usage.
    </p>

    <form method="POST">

        <!-- DATA -->
        <div class="mb-3">
            <label class="form-label">Text or URL</label>
            <input type="text" class="form-control" name="data" placeholder="Enter text or URL" required>
        </div>

        <!-- EXPIRY -->
        <div class="mb-3">
            <label class="form-label">Expiry (minutes)</label>
            <input type="number" class="form-control" name="expiry" value="5" min="1" required>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <label class="form-label">Password (Optional)</label>
            <input type="password" class="form-control" name="password" placeholder="Set password for this QR">
        </div>

        <!-- ONE TIME (ONLY ONE) -->
        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="one_time" id="one_time">
            <label class="form-check-label" for="one_time">
                One-Time QR (expires after first scan)
            </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Generate
        </button>

    </form>
</div>
{% endblock %}
